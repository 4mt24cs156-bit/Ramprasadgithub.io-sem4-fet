<!DOCTYPE html>
<html>
<head>
    <style>
        /* Centers the card on the screen */
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #eee; font-family: sans-serif; }
        
        .card { width: 350px; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Forces the iframe to be 16:9 ratio */
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-box iframe { position: absolute; width: 100%; height: 100%; border: 0; border-radius: 4px; }
        
        .btn { display: block; text-align: center; background: #333; color: #fff; padding: 10px; text-decoration: none; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="video-box">
            <iframe src="https://www.youtube.com/watch?v=HcOc7P5BMi4&list=PLfqMhTWNBTe0PY9xunOzsP5kmYIz2Hu7i" allowfullscreen></iframe>
        </div>

        <h3>Project Title</h3>
        <p>Short description of your project.</p>

        <a href="https://github.com/4mt24cs156-bit/sem4-fet" class="btn" target="_blank">View on GitHub</a>
    </div>

</body>
</html>
